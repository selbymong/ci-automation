version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: evaluator-postgres
    environment:
      POSTGRES_DB: evaluator
      POSTGRES_USER: evaluator
      POSTGRES_PASSWORD: evaluator_dev
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evaluator -d evaluator"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
